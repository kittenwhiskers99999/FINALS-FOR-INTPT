<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile – SpotIfind</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}">
</head>
<body>

<header class="navbar">
    <a href="/" class="logo">
        <img src="{{ url_for('static', filename='assets/logo.png') }}" alt="logo">
        SpotIfind
    </a>
    <nav class="nav-links">
        <a href="/lost" class="tab">Lost Items</a>
        <a href="/found" class="tab">Found Items</a>
        <a href="/inbox" class="tab">Inbox</a>
        <a href="/about" class="tab">About</a>
    </nav>
    <div class="auth">
        <a href="/logout" class="tab login">Logout</a>
    </div>
</header>

<main class="container">
    <div class="report-wrapper">
        <div class="report-header">
            <h1>Edit Profile</h1>
            <p>Update your account information below.</p>
        </div>

        {% if success %}
        <div class="alert-success">&#10003; {{ success }} <a href="/profile">View Profile</a></div>
        {% endif %}

        {% if message %}
        <div class="alert-error">&#9888; {{ message }}</div>
        {% endif %}

        <form method="post" class="report-form">

            <div class="form-group">
                <label>Username</label>
                <input type="text" value="{{ user.username }}" disabled style="opacity:0.5;cursor:not-allowed;">
                <p class="file-hint">Username cannot be changed.</p>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ user.email }}" required>
            </div>

            <div class="form-group">
                <label>Contact Number</label>
                <input type="text" name="contact_number" value="{{ user.contact_number }}" required>
            </div>

            <div class="form-group">
                <label>Location</label>
                <input type="text" name="location" value="{{ user.location }}" required>
            </div>

            <div class="form-group">
                <label>New Password <span class="optional">(leave blank to keep current)</span></label>
                <input type="password" name="new_password" placeholder="Enter new password">
            </div>

            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" name="confirm_password" placeholder="Confirm new password">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">Save Changes</button>
                <a href="/profile" class="btn-cancel">Cancel</a>
            </div>

        </form>
    </div>
</main>

<script>
// Secret admin access: click logo 5 times rapidly
let logoClicks = 0, logoTimer;
document.querySelector('.logo').addEventListener('click', function(e) {
    e.preventDefault();
    logoClicks++;
    clearTimeout(logoTimer);
    logoTimer = setTimeout(() => logoClicks = 0, 1500);
    if (logoClicks >= 5) {
        logoClicks = 0;
        window.location.href = '/admin/login';
    } else {
        window.location.href = this.getAttribute('href') || '/';
    }
});
</script>
</body>
</html>
